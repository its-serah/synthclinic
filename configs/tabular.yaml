# GenMed — Tabular Generator Config (CTGAN / TVAE)
# Run: python experiments/train_tabular.py --config configs/tabular.yaml

data:
  dataset: heart_disease       # heart_disease | diabetes | combined
  cache_dir: data/raw/tabular

model:
  type: ctgan                  # ctgan | tvae
  epochs: 300
  batch_size: 500
  generator_dim: [256, 256]
  discriminator_dim: [256, 256]
  embedding_dim: 128           # TVAE only
  verbose: false
  cuda: true

generate:
  n_samples: 500

output:
  checkpoint_dir: checkpoints/tabular
  synthetic_path: data/processed/tabular_synthetic.csv

evaluation:
  run_tstr: true
  run_feature_tests: true
  run_privacy: true
